name: Monitor Tennis Tickets

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  # ── Job 1: run scrapers, commit data ────────────────────────────────────────
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push commits back to main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Initialize data files
        run: |
          mkdir -p data
          [ -f data/price_history.json ] || echo "[]" > data/price_history.json
          [ -f data/ticketmaster_state.json ] || echo "{}" > data/ticketmaster_state.json
          mkdir -p src/dashboard
          [ -f src/dashboard/data.js ] || echo "window.PRICE_DATA = {};" > src/dashboard/data.js

      - name: Run price monitor
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          MAX_PRICE_NIGHT: ${{ secrets.MAX_PRICE_NIGHT }}
          MAX_PRICE_DAY: ${{ secrets.MAX_PRICE_DAY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
        run: python src/main.py

      - name: Generate dashboard data
        run: python generate_dashboard.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --ignore-unmatch data/price_history.json data/ticketmaster_state.json src/dashboard/data.js
          git diff --cached --quiet || \
            git commit -m "chore: price check $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git push

  # ── Job 2: deploy dashboard to GitHub Pages ──────────────────────────────────
  deploy-pages:
    needs: run-monitor
    runs-on: ubuntu-latest
    permissions:
      pages: write        # required to deploy to Pages
      id-token: write     # required for OIDC token

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # ensure we have the commit just pushed by run-monitor

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/dashboard

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
